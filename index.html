        let currentContent = '';

        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.tab).classList.add('active');
            });
        });

        function getBadgeClass(platform) {
            return 'platform-' + (platform === 'x' ? 'twitter' : platform);
        }

        function renderStats() {
            const counts = { substack: 0, twitter: 0, linkedin: 0, instagram: 0, general: 0 };
            contentData.forEach(c => { if (counts[c.platform] !== undefined) counts[c.platform]++; });
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-number">${counts.substack}</div><div class="stat-label">Essays</div></div>
                <div class="stat-card"><div class="stat-number">${counts.general}</div><div class="stat-label">Show Notes</div></div>
                <div class="stat-card"><div class="stat-number">${counts.twitter}</div><div class="stat-label">X / Twitter</div></div>
                <div class="stat-card"><div class="stat-number">${counts.linkedin}</div><div class="stat-label">LinkedIn</div></div>
                <div class="stat-card"><div class="stat-number">${counts.instagram}</div><div class="stat-label">Instagram</div></div>
            `;
        }

        function renderAll() {
            const containers = {
                'overview': { data: contentData.slice(0, 10), el: 'latest-content' },
                'substack': { data: contentData.filter(c => c.platform === 'substack'), el: 'substack-content' },
                'twitter': { data: contentData.filter(c => c.platform === 'twitter'), el: 'twitter-content' },
                'linkedin': { data: contentData.filter(c => c.platform === 'linkedin'), el: 'linkedin-content' },
                'instagram': { data: contentData.filter(c => c.platform === 'instagram'), el: 'instagram-content' },
                'shows': { data: contentData.filter(c => c.platform === 'general' && c.tags && c.tags.includes('show-notes')), el: 'shows-content' },
                'today': { data: contentData.filter(c => c.created_at && c.created_at.startsWith('2026-03-03')), el: 'today-content' }
            };

            Object.keys(containers).forEach(key => {
                const { data, el } = containers[key];
                const container = document.getElementById(el);
                if (!container) return;
                
                if (!data.length) {
                    container.innerHTML = '<p style="color:#6e6e73;text-align:center;padding:40px;">No content</p>';
                    return;
                }

                container.innerHTML = data.map(item => `
                    <div class="content-card">
                        <div class="content-header">
                            <h3 class="content-title">${item.title || 'Untitled'}</h3>
                            <span class="platform-badge ${getBadgeClass(item.platform)}">${item.platform}</span>
                        </div>
                        <div class="content-preview">${(item.body || '').substring(0, 200)}...</div>
                        <button class="btn btn-primary" onclick="openModal('${item.id}')">📋 View & Copy</button>
                    </div>
                `).join('');
            });
        }

        function openModal(id) {
            const item = contentData.find(c => c.id === id);
            if (!item) return;
            document.getElementById('modal-title').textContent = item.title || 'Untitled';
            document.getElementById('modal-body').textContent = item.body || 'No content';
            currentContent = item.body || '';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        document.getElementById('copyBtn').addEventListener('click', function() {
            navigator.clipboard.writeText(currentContent).then(() => {
                const fb = document.getElementById('copy-feedback');
                fb.classList.add('show');
                setTimeout(() => fb.classList.remove('show'), 2000);
            });
        });

        renderStats();
        renderAll();
    </script>
