        });

        // Render content
        function renderContent() {
            const platforms = {
                'overview': contentData.slice(0, 6),
                'substack': contentData.filter(c => c.platform === 'substack'),
                'twitter': contentData.filter(c => c.platform === 'twitter'),
                'linkedin': contentData.filter(c => c.platform === 'linkedin'),
                'instagram': contentData.filter(c => c.platform === 'instagram'),
                'shows': contentData.filter(c => c.platform === 'general' && c.tags.includes('show-notes')),
                'today': contentData.filter(c => c.date === '2026-03-03')
            };

            Object.keys(platforms).forEach(key => {
                const container = document.getElementById(key === 'overview' ? 'latest-content' : key + '-content');
                if (container) {
                    container.innerHTML = platforms[key].map(item => `
                        <div class="content-card">
                            <div class="content-header">
                                <h3 class="content-title">${item.title}</h3>
                                <div class="content-meta">
                                    <span class="platform-badge platform-${item.platform}">${item.platform}</span>
                                </div>
                            </div>
                            <div class="content-preview">${item.preview}</div>
                            <div class="content-actions">
                                <button class="btn btn-primary" onclick="openModal('${item.id}')">📄 View & Copy</button>
                            </div>
                        </div>
                    `).join('');
                }
            });
        }

        function openModal(id) {
            const item = contentData.find(c => c.id === id);
            if (!item) return;
            
            currentContent = item.body;
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-body').textContent = item.body;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function copyContent() {
            navigator.clipboard.writeText(currentContent).then(() => {
                const feedback = document.getElementById('copy-feedback');
                feedback.classList.add('show');
                setTimeout(() => feedback.classList.remove('show'), 2000);
            });
        }

        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Close modal on background click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Initial render
        renderContent();
    </script>
</body>
</html>
