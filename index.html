<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venture Protocol — Content Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #fafafa;
            --bg-glass: rgba(255,255,255,0.72);
            --bg-glass-strong: rgba(255,255,255,0.85);
            --border: rgba(0,0,0,0.06);
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --shadow-medium: 0 8px 32px rgba(0,0,0,0.08);
            --radius-md: 18px;
            --radius-lg: 28px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        header { text-align: center; margin-bottom: 48px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 500; margin-bottom: 12px; background: linear-gradient(135deg,#1d1d1f,#434344); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 1.1rem; color: var(--text-secondary); font-weight: 300; }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; flex-wrap: wrap; }
        .nav-tab { padding: 12px 24px; background: var(--bg-glass); border: 1px solid var(--border); border-radius: 100px; font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; backdrop-filter: blur(20px); }
        .nav-tab:hover { background: var(--bg-glass-strong); }
        .nav-tab.active { background: var(--text-primary); color: white; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: var(--bg-glass); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; text-align: center; }
        .stat-number { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 600; }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }
        .content-grid { display: grid; gap: 16px; }
        .content-card { background: var(--bg-glass-strong); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 24px; transition: all 0.2s; }
        .content-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-medium); }
        .content-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .content-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 500; }
        .platform-badge { padding: 4px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .platform-linkedin { background: #e8f4ff; color: #0066cc; }
        .platform-twitter, .platform-x { background: #f0f0f0; color: #1d1d1f; }
        .platform-instagram { background: #fdf0f5; color: #e1306c; }
        .platform-substack { background: #fff4e6; color: #ff671b; }
        .platform-general { background: #f5f5f7; color: #6e6e73; }
        .content-preview { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 16px; max-height: 80px; overflow: hidden; position: relative; }
        .content-preview::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 30px; background: linear-gradient(transparent, var(--bg-glass-strong)); }
        .btn { padding: 10px 20px; border-radius: 12px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--text-primary); color: white; }
        .btn-primary:hover { background: #333; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 24px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: var(--radius-lg); max-width: 800px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 32px; box-shadow: var(--shadow-medium); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 500; }
        .modal-close { width: 36px; height: 36px; border-radius: 50%; border: none; background: #f5f5f7; cursor: pointer; font-size: 1.4rem; }
        .full-content { font-size: 0.95rem; line-height: 1.8; white-space: pre-wrap; }
        .copy-feedback { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text-primary); color: white; padding: 12px 24px; border-radius: 100px; font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 2000; }
        .copy-feedback.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        @media (max-width: 768px) { h1 { font-size: 2.5rem; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Venture Protocol</h1>
            <p class="subtitle">Content Hub — Ana Lukach</p>
        </header>
        
        <nav class="nav-tabs" id="navTabs">
            <button class="nav-tab active" data-tab="overview">Overview</button>
            <button class="nav-tab" data-tab="substack">Essays</button>
            <button class="nav-tab" data-tab="twitter">X / Twitter</button>
            <button class="nav-tab" data-tab="linkedin">LinkedIn</button>
            <button class="nav-tab" data-tab="instagram">Instagram</button>
            <button class="nav-tab" data-tab="shows">Show Notes</button>
            <button class="nav-tab" data-tab="today">Today</button>
        </nav>

        <section id="overview" class="section active">
            <div class="stats-row" id="stats"></div>
            <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;margin-bottom:16px;">Latest Content</h3>
            <div class="content-grid" id="latest-content"><div class="loading">Loading...</div></div>
        </section>

        <section id="substack" class="section"><div class="content-grid" id="substack-content"><div class="loading">Loading...</div></div></section>
        <section id="twitter" class="section"><div class="content-grid" id="twitter-content"><div class="loading">Loading...</div></section>
        <section id="linkedin" class="section"><div class="content-grid" id="linkedin-content"><div class="loading">Loading...</div></section>
        <section id="instagram" class="section"><div class="content-grid" id="instagram-content"><div class="loading">Loading...</div></section>
        <section id="shows" class="section"><div class="content-grid" id="shows-content"><div class="loading">Loading...</div></section>
        <section id="today" class="section"><div class="content-grid" id="today-content"><div class="loading">Loading...</div></section>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title"></h2>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="full-content" id="modal-body"></div>
            <div style="margin-top:24px"><button class="btn btn-primary" id="copyBtn">📋 Copy to Clipboard</button></div>
        </div>
    </div>
    <div class="copy-feedback" id="copy-feedback">Copied!</div>

    <script>
        const SUPABASE_URL = 'https://sldqlvxzszfoydresisf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsZHFsdnh6c3pmb3lkcmVzaXNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMzUwNjUsImV4cCI6MjA4NzYxMTA2NX0.UV6021QdzWujW5n6Alq4zrVah1R5x0NASjS0N6eR3NU';
        
        let allContent = [];
        let currentContent = '';

        // Tab switching
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.tab).classList.add('active');
            });
        });

        async function loadContent() {
            try {
                const resp = await fetch(`${SUPABASE_URL}/rest/v1/content_queue?select=*&order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                allContent = await resp.json();
                renderStats();
                renderAll();
            } catch(e) {
                console.error(e);
                document.querySelectorAll('.loading').forEach(el => el.textContent = 'Error loading content');
            }
        }

        function renderStats() {
            const counts = { substack: 0, twitter: 0, linkedin: 0, instagram: 0, general: 0 };
            allContent.forEach(c => { if (counts[c.platform] !== undefined) counts[c.platform]++; });
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-number">${counts.substack}</div><div class="stat-label">Essays</div></div>
                <div class="stat-card"><div class="stat-number">${counts.general}</div><div class="stat-label">Show Notes</div></div>
                <div class="stat-card"><div class="stat-number">${counts.twitter}</div><div class="stat-label">X / Twitter</div></div>
                <div class="stat-card"><div class="stat-number">${counts.linkedin}</div><div class="stat-label">LinkedIn</div></div>
                <div class="stat-card"><div class="stat-number">${counts.instagram}</div><div class="stat-label">Instagram</div></div>
            `;
        }

        function getBadgeClass(platform) {
            return 'platform-' + (platform === 'x' ? 'twitter' : platform);
        }

        function renderAll() {
            const containers = {
                'overview': { data: allContent.slice(0, 8), el: 'latest-content' },
                'substack': { data: allContent.filter(c => c.platform === 'substack'), el: 'substack-content' },
                'twitter': { data: allContent.filter(c => c.platform === 'twitter'), el: 'twitter-content' },
                'linkedin': { data: allContent.filter(c => c.platform === 'linkedin'), el: 'linkedin-content' },
                'instagram': { data: allContent.filter(c => c.platform === 'instagram'), el: 'instagram-content' },
                'shows': { data: allContent.filter(c => c.platform === 'general' && c.tags && c.tags.includes('show-notes')), el: 'shows-content' },
                'today': { data: allContent.filter(c => c.created_at && c.created_at.startsWith('2026-03-03')), el: 'today-content' }
            };

            Object.keys(containers).forEach(key => {
                const { data, el } = containers[key];
                const container = document.getElementById(el);
                if (!container) return;
                
                if (!data.length) {
                    container.innerHTML = '<p style="color:#6e6e73;text-align:center;padding:40px;">No content</p>';
                    return;
                }

                container.innerHTML = data.map(item => `
                    <div class="content-card">
                        <div class="content-header">
                            <h3 class="content-title">${item.title || 'Untitled'}</h3>
                            <span class="platform-badge ${getBadgeClass(item.platform)}">${item.platform}</span>
                        </div>
                        <div class="content-preview">${(item.body || '').substring(0, 200)}...</div>
                        <button class="btn btn-primary" onclick="openModal('${item.id}')">📋 View & Copy</button>
                    </div>
                `).join('');
            });
        }

        function openModal(id) {
            const item = allContent.find(c => c.id === id);
            if (!item) return;
            document.getElementById('modal-title').textContent = item.title || 'Untitled';
            document.getElementById('modal-body').textContent = item.body || 'No content';
            currentContent = item.body || '';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        document.getElementById('copyBtn').addEventListener('click', function() {
            navigator.clipboard.writeText(currentContent).then(() => {
                const fb = document.getElementById('copy-feedback');
                fb.classList.add('show');
                setTimeout(() => fb.classList.remove('show'), 2000);
            });
        });

        loadContent();
    </script>
</body>
</html>
